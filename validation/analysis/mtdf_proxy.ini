# TOY COMPARISON: ΔN_eff proxy for EDE-type models (NOT MTDF's actual amplitude)
# This is a phenomenological test using effective N_eff to demonstrate
# what would be needed for a large (~1%) r_s reduction typical of EDE models.
# MTDF's actual EFE is much smaller: f_kick ≈ 0.33%, Δr_s/r_s ≈ 0.07%, ΔN_eff ≈ 0.02

# Hubble parameter
h = 0.70

# Physical baryon density - unchanged
omega_b = 0.02237

# Physical CDM density - unchanged
omega_cdm = 0.1200

# Optical depth to reionization
tau_reio = 0.0544

# Scalar spectral index
n_s = 0.9649

# Scalar amplitude (ln(10^10 A_s))
ln10^{10}A_s = 3.044

# TOY COMPARISON: extra radiation to mimic EDE-type models
# Standard N_eff = 3.046, we add Delta_N_eff = 0.22 (typical EDE regime)
# N_ur represents "ultra-relativistic" species
# Standard split: N_ur = 2.0328 (for 2 massless + partial contribution)
# With Delta_N_eff = 0.22: N_ur = 2.0328 + 0.22 = 2.2528
# This gives r_s reduction of ~0.74% (EDE-like, NOT MTDF's actual 0.07%)
N_ur = 2.2528
N_ncdm = 1
m_ncdm = 0.06

# Output settings
output = tCl,pCl,lCl
lensing = yes
l_max_scalars = 2500
accurate_lensing = 1

# Precision settings
tol_background_integration = 1.e-4
tol_thermo_integration = 1.e-3
tol_perturb_integration = 1.e-5
