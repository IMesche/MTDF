# H0 = 70 km/s/Mpc without early dark energy
# Same physical densities as Planck baseline (omega_b, omega_cdm)
# This will show the "Hubble tension" effect on CMB

# Hubble parameter - changed to 70
h = 0.70

# Physical baryon density - unchanged
omega_b = 0.02237

# Physical CDM density - unchanged
omega_cdm = 0.1200

# Optical depth to reionization
tau_reio = 0.0544

# Scalar spectral index
n_s = 0.9649

# Scalar amplitude (ln(10^10 A_s))
ln10^{10}A_s = 3.044

# Standard neutrino parameters
N_ur = 2.0328
N_ncdm = 1
m_ncdm = 0.06

# Output settings
output = tCl,pCl,lCl
lensing = yes
l_max_scalars = 2500
accurate_lensing = 1

# Precision settings
tol_background_integration = 1.e-4
tol_thermo_integration = 1.e-3
tol_perturb_integration = 1.e-5
