# LCDM baseline parameter file for CLASS (comparison to MTDF)
#
# Standard LCDM cosmology with Planck 2018 best-fit parameters

# -------------------------------------------
# Background cosmological parameters
# -------------------------------------------

# Hubble parameter today (H0/100)
h = 0.6736

# Baryon density
omega_b = 0.02237

# CDM density
omega_cdm = 0.1200

# Dark energy density (cosmological constant)
Omega_Lambda = 0.6847

# Effective number of relativistic species
N_ur = 2.0328

# CMB temperature
T_cmb = 2.7255

# -------------------------------------------
# MTDF disabled for baseline
# -------------------------------------------
mtdf = no

# Write background evolution
write_background = yes

# -------------------------------------------
# Output settings
# -------------------------------------------

# What to compute
output = tCl,pCl,lCl,mPk

# Maximum multipole
l_max_scalars = 2500

# Primordial spectrum
A_s = 2.1e-9
n_s = 0.9649

# -------------------------------------------
# Precision settings
# -------------------------------------------

# Background integration
background_verbose = 1

# Perturbations
perturbations_verbose = 1

# Output
output_verbose = 1
