# MTDF (Mesche Tensor Dynamics Framework) parameter file for CLASS
#
# This file configures CLASS to run with MTDF modifications:
# - Early Field Energy (EFE) injection near matter-radiation equality
# - Modified growth via mu(a) at late times (optional)
#
# Expected effects:
# - Sound horizon reduction: ~0.74%
# - H0 consistency: ~70 km/s/Mpc without CMB tension

# -------------------------------------------
# Background cosmological parameters
# -------------------------------------------

# Hubble parameter today (H0/100)
h = 0.70

# Baryon density
omega_b = 0.02226

# CDM density (MTDF replaces this conceptually, but CLASS needs it for calculations)
omega_cdm = 0.1186

# Dark energy density (cosmological constant equivalent)
Omega_Lambda = 0.685

# Effective number of relativistic species
N_ur = 2.0328

# CMB temperature
T_cmb = 2.7255

# -------------------------------------------
# MTDF-specific parameters
# -------------------------------------------

# Enable MTDF
mtdf = yes

# MTDF fundamental parameters (from V71 calibration)
# alpha: stress-matter coupling strength
mtdf_alpha = 1.30

# beta_eos: equation of state transition parameter
mtdf_beta_eos = 0.573

# z_t: late-time transition redshift for mu(a)
mtdf_z_t = 0.74

# Enable Early Field Energy contribution (yes/no)
mtdf_efe = yes

# Enable late-time growth modification mu(a) (yes/no)
# Note: For CMB-only analysis, can set to 'no' to isolate EFE effects
mtdf_growth = no

# -------------------------------------------
# Output settings
# -------------------------------------------

# What to compute
output = tCl,pCl,lCl,mPk

# Write background evolution
write_background = yes

# Maximum multipole
l_max_scalars = 2500

# Primordial spectrum
A_s = 2.1e-9
n_s = 0.965

# -------------------------------------------
# Precision settings
# -------------------------------------------

# Background integration
background_verbose = 2

# Perturbations
perturbations_verbose = 1

# Output
output_verbose = 1
