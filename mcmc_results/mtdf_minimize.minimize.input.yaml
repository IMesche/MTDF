theory:
  classy:
    extra_args:
      non linear: hmcode
      N_ncdm: 1
      N_ur: 2.0328
      mtdf: 'yes'
      mtdf_efe: 'yes'
      mtdf_growth: 'yes'
      mtdf_alpha: 1.3
      mtdf_beta_eos: 0.573
      mtdf_z_t: 0.74
    stop_at_error: false
    speed: 2.2
likelihood:
  planck_2018_lowl.TT_clik: null
  planck_2018_lowl.EE_clik: null
  planck_2018_highl_plik.TTTEEE: null
  planck_2018_lensing.native: null
params:
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.001
    proposal: 0.001
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: A_\mathrm{s}
  n_s:
    prior:
      min: 0.8
      max: 1.2
    ref:
      dist: norm
      loc: 0.965
      scale: 0.004
    proposal: 0.002
    latex: n_\mathrm{s}
  theta_s_100:
    prior:
      min: 0.5
      max: 10
    ref:
      dist: norm
      loc: 1.04092
      scale: 0.0004
    proposal: 0.0002
    latex: 100\theta_\mathrm{s}
  omega_b:
    prior:
      min: 0.005
      max: 0.1
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
  omega_cdm:
    prior:
      min: 0.001
      max: 0.99
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2
  tau_reio:
    prior:
      min: 0.01
      max: 0.8
    ref:
      dist: norm
      loc: 0.055
      scale: 0.006
    proposal: 0.003
    latex: \tau_\mathrm{reio}
  mtdf_k_f:
    prior:
      min: 0.0
      max: 5.0
    ref:
      dist: norm
      loc: 1.0
      scale: 0.5
    proposal: 0.3
    latex: k_f
  H0:
    latex: H_0
    min: 20
    max: 100
  sigma8:
    latex: \sigma_8
  Omega_m:
    latex: \Omega_\mathrm{m}
  m_ncdm:
    value: 0.06
    renames: mnu
sampler:
  minimize:
    method: bobyqa
    best_of: 4
    max_evals: 1e4d
    confidence_for_unbounded: 0.9999995
    covmat: auto
packages_path: cobaya_packages  # adjust to your cobaya packages location
output: mtdf_minimize
